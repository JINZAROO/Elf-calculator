name: Fetch Elf Market Prices

on:
  schedule:
    # 매시 0분에 실행 (UTC 기준! 한국시간(KST)은 UTC+9 입니다)
    - cron: '0 * * * *'
  workflow_dispatch: {}  # Actions 탭에서 수동으로도 실행 가능하게

permissions:
  contents: write  # 저장소에 커밋/푸시를 하기 위해 필요

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 가격 조회 스크립트 실행
        run: node scripts/fetch-prices.mjs

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/price-history.json
          git diff --staged --quiet || git commit -m "chore: update price history $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
