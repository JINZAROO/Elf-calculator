<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elf Market Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Noto+Serif+KR:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    padding-top: 116px;
    font-family: 'Noto Serif KR', serif;
    background: #2b1d0e;
    background-image:
      radial-gradient(ellipse at top, #3d2510 0%, #2b1d0e 60%),
      url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    color: #3d2510;
    min-height: 100vh;
    padding-top: 90px;
  }

  /* ── 고정 헤더 ── */
  .topbar {
    justify-content: center;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: linear-gradient(180deg, #5c3317 0%, #3d2510 100%);
    border-bottom: 3px solid #c8922a;
    box-shadow: 0 4px 16px rgba(0,0,0,0.5);
    padding: 0 2rem;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo { display: flex; align-items: center; gap: 12px; }

  .logo-icon {
    width: 38px; height: 38px;
    background: radial-gradient(circle, #f0c060, #c8922a);
    border-radius: 50%;
    border: 2px solid #f0c060;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 0 10px rgba(200,146,42,0.6);
  }

  h1 {
    font-size: 18px; font-weight: 600;
    color: #f0c060;
    text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    letter-spacing: 0.03em;
  }
  .subtitle { font-size: 11px; color: #c8a06a; margin-top: 2px; font-family: 'Inter', sans-serif; }

  .status-bar {
    display: flex; align-items: center; gap: 8px;
    font-size: 12px; color: #c8a06a;
    font-family: 'Inter', sans-serif;
  }

  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #5fd068;
    animation: pulse 2s infinite;
  }
  .dot.error { background: #e05050; animation: none; }
  .dot.loading { background: #f0c060; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  /* ── 큰 탭 ── */
  .main-tabs {
    position: fixed;        
    top: 64px;           
    left: 0; right: 0;     
    z-index: 99; 
    justify-content: center;
    display: flex;
    background: linear-gradient(180deg, #3d2510 0%, #2e1c0c 100%);
    border-bottom: 2px solid #c8922a;
    padding: 0 2rem;
  }

  .main-tab {
    padding: 11px 22px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Serif KR', serif;
    color: #a07040;
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.15s;
    letter-spacing: 0.02em;
  }

  .main-tab:hover { color: #f0c060; }
  .main-tab.active {
    color: #f0c060;
    border-bottom-color: #f0c060;
    text-shadow: 0 0 8px rgba(240,192,96,0.4);
  }

  /* ── 페이지 ── */
  .page { display: none; padding: 2rem; max-width: 1000px; margin: 0 auto; }
  .page.active { display: block; }

  .coming-soon {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 300px;
    color: #a07040;
    font-size: 14px; gap: 12px;
    font-family: 'Inter', sans-serif;
  }
  .coming-soon .icon { font-size: 40px; }

  /* ── 서브 탭 ── */
  .sub-tabs {
    display: flex; gap: 6px;
    margin-bottom: 1.5rem;
    background: rgba(0,0,0,0.25);
    border: 1px solid #8b6030;
    border-radius: 10px;
    padding: 5px;
    width: fit-content;
  }

  .sub-tab {
    padding: 6px 18px;
    border-radius: 7px;
    font-size: 13px;
    font-weight: 600;
    font-family: 'Noto Serif KR', serif;
    cursor: pointer;
    color: #a07040;
    transition: all 0.15s;
    border: none;
    background: none;
  }

  .sub-tab.active {
    background: linear-gradient(135deg, #c8922a, #a07030);
    color: #fff8e8;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .sub-tab:hover:not(.active) { color: #f0c060; background: rgba(200,146,42,0.15); }

  /* ── 카드 그리드 ── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
    gap: 14px;
  }

  .card {
    background: linear-gradient(160deg, #f5e8cc 0%, #e8d5aa 100%);
    border: 2px solid #c8922a;
    border-radius: 10px;
    padding: 1rem;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 8px;
    background: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
  }

  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.3);
    border-color: #f0c060;
  }

  /* 아이템 이미지 영역 */
  .card-img {
    width: 72px; height: 72px;
    margin: 0 auto 10px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(180,130,60,0.15);
    border: 1px dashed #c8922a;
    border-radius: 8px;
    font-size: 36px;
    position: relative;
    overflow: hidden;
  }

  .card-img img {
    width: 100%; height: 100%;
    object-fit: contain;
    position: absolute; inset: 0;
  }

  .card-img .placeholder {
    font-size: 11px;
    color: #a07040;
    text-align: center;
    line-height: 1.3;
    font-family: 'Inter', sans-serif;
    padding: 4px;
  }

  .card-name {
    font-size: 13px; font-weight: 600;
    color: #3d2510;
    margin-bottom: 2px;
    text-align: center;
  }

  .card-korean {
    font-family: 'Gowun Dodum', sans-serif;
    font-size: 10px; color: #a07040;
    margin-bottom: 10px;
    font-family: monospace;
    text-align: center;
  }

  .card-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, #c8922a, transparent);
    margin-bottom: 10px;
  }

  .card-price {
    font-size: 20px; font-weight: 700;
    color: #7a3e00;
    letter-spacing: -0.5px;
    text-align: center;
    font-family: 'Inter', sans-serif;
  }

  .card-price-label {
    font-size: 10px; color: #a07040;
    margin-top: 3px;
    text-align: center;
    font-family: 'Inter', sans-serif;
  }

  .card.loading .card-price {
    background: #d4b87a;
    border-radius: 4px;
    color: transparent;
    animation: shimmer 1.5s infinite;
  }

  @keyframes shimmer {
    0%, 100% { opacity: 0.5; }
    50% { opacity: 1; }
  }

  /* ── 컨트롤 ── */
  .controls {
    display: flex; gap: 8px;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .search {
    background: rgba(0,0,0,0.2);
    border: 1px solid #8b6030;
    border-radius: 8px;
    padding: 8px 12px;
    color: #f5e8cc;
    font-size: 13px;
    outline: none;
    width: 200px;
    font-family: 'Inter', sans-serif;
  }
  .search::placeholder { color: #a07040; }
  .search:focus { border-color: #f0c060; }

  .refresh-btn {
    background: linear-gradient(135deg, #5c3317, #3d2510);
    border: 1px solid #8b6030;
    color: #f0c060;
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'Inter', sans-serif;
  }
  .refresh-btn:hover { border-color: #f0c060; background: linear-gradient(135deg, #7a4520, #5c3317); }

  .last-update { font-size: 11px; color: #a07040; margin-left: auto; font-family: 'Inter', sans-serif; }

  .error-msg {
    background: #4a1a1a;
    border: 1px solid #8b3030;
    border-radius: 8px;
    padding: 1rem;
    color: #f5a0a0;
    font-size: 13px;
    margin-bottom: 1rem;
    font-family: 'Inter', sans-serif;
  }

  .empty {
    text-align: center;
    padding: 4rem;
    color: #a07040;
    font-size: 14px;
    grid-column: 1/-1;
    font-family: 'Inter', sans-serif;
  }

  /* ── 시세 추이 탭 ── */
  .chip-section-label {
    font-size: 12px;
    color: #c8a06a;
    font-family: 'Inter', sans-serif;
    margin-bottom: 8px;
  }

  .chip-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .chip-row .chip {
    width: 52px;
    flex: 0 0 52px;
  }

  .chip-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
    gap: 8px;
    margin-bottom: 1.5rem;
  }

  .chip {
    position: relative;
    aspect-ratio: 1;
    border-radius: 8px;
    background: rgba(180,130,60,0.15);
    border: 2px solid #8b6030;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px;
    cursor: pointer;
    transition: all 0.15s;
    overflow: hidden;
  }
  .chip img { width: 100%; height: 100%; object-fit: contain; }
  .chip:hover { border-color: #f0c060; transform: translateY(-2px); }
  .chip.selected {
    border-color: #f0c060;
    background: rgba(240,192,96,0.25);
    box-shadow: 0 0 0 2px rgba(240,192,96,0.4);
  }
  .chip.hidden { display: none; }

  /* 커스텀 툴팁 (title 속성 대신 사용, 모바일에서도 보이도록) */
  .chip .chip-tip {
    position: absolute;
    bottom: 110%;
    left: 50%;
    transform: translateX(-50%);
    background: #2b1d0e;
    border: 1px solid #c8922a;
    color: #f0c060;
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    padding: 3px 8px;
    border-radius: 6px;
    white-space: nowrap;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.12s;
    z-index: 10;
  }
  .chip:hover .chip-tip { opacity: 1; }

  .chart-panel {
    background: linear-gradient(160deg, #f5e8cc 0%, #e8d5aa 100%);
    border: 2px solid #c8922a;
    border-radius: 10px;
    padding: 1.25rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
  }

  .chart-panel-empty {
    text-align: center;
    padding: 3rem 1rem;
    color: #a07040;
    font-size: 13px;
    font-family: 'Inter', sans-serif;
  }

  .chart-panel-head {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 1rem;
  }

  .chart-img {
    width: 40px; height: 40px;
    background: rgba(180,130,60,0.15);
    border: 1px dashed #c8922a;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    overflow: hidden;
  }
  .chart-img img { width: 100%; height: 100%; object-fit: contain; }

  .chart-head-name { font-size: 15px; font-weight: 600; color: #3d2510; }
  .chart-head-sub { font-size: 11px; color: #a07040; font-family: 'Inter', sans-serif; margin-top: 2px; }

  .chart-canvas-wrap { position: relative; height: 280px; }

  .price-svg { width: 100%; height: 100%; display: block; overflow: visible; font-family: 'Inter', sans-serif; }
  .price-svg .line-path { fill: none; stroke: #c8922a; stroke-width: 2; }
  .price-svg .fill-path { fill: rgba(200,146,42,0.15); stroke: none; }
  .price-svg .grid-line { stroke: rgba(139,96,48,0.25); stroke-width: 1; }
  .price-svg .axis-label { fill: #a07040; font-size: 10px; }
  .price-svg .data-dot { fill: #7a3e00; }
  .price-svg .data-dot-hit { fill: transparent; cursor: pointer; }
  .price-svg .data-dot-hit:hover + .data-dot { r: 4; }

  .chart-tooltip {
    position: absolute;
    background: #2b1d0e;
    border: 1px solid #c8922a;
    color: #f0c060;
    font-size: 11px;
    font-family: 'Inter', sans-serif;
    padding: 4px 8px;
    border-radius: 6px;
    white-space: nowrap;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.1s;
    transform: translate(-50%, -100%);
    z-index: 20;
  }
  .chart-tooltip.show { opacity: 1; }
</style>
</head>
<body>

<!-- 고정 헤더 -->
<div class="topbar">
  <div class="logo">
    <div class="logo-icon">🧝</div>
    <div>
      <h1>Elf Market Tracker</h1>
      <div class="subtitle">실시간 마켓플레이스 가격 추적</div>
    </div>
  </div>
  <div class="status-bar">
    <div class="dot loading" id="dot"></div>
    <span id="status-text">불러오는 중...</span>
  </div>
</div>

<!-- 큰 탭 -->
<div class="main-tabs">
  <button class="main-tab active" onclick="setMainTab('realtime')">실시간</button>
  <button class="main-tab" onclick="setMainTab('sigil')">Sigil 퀘스트</button>
  <button class="main-tab" onclick="setMainTab('coming1')">추가예정1</button>
  <button class="main-tab" onclick="setMainTab('coming2')">추가예정2</button>
</div>

<!-- 실시간 탭 -->
<div class="page active" id="page-realtime">
  <div id="error-area"></div>
  <div class="sub-tabs">
    <button class="sub-tab active" onclick="setSubTab('resources')">🌿 자원</button>
    <button class="sub-tab" onclick="setSubTab('costume')">👗 Pi Elf 의상</button>
    <button class="sub-tab" onclick="setSubTab('general')">📦 일반</button>
  </div>
  <div class="controls">
    <input class="search" type="text" id="search" placeholder="아이템 검색..." oninput="renderCards()" />
    <button class="refresh-btn" onclick="loadAll()">↻ 새로고침</button>
    <span class="last-update" id="last-update"></span>
  </div>
  <div class="grid" id="grid">
    <div class="empty">가격 정보를 불러오는 중...</div>
  </div>
</div>

<!-- Sigil 퀘스트 탭 -->
<div class="page" id="page-sigil">
  <div class="coming-soon"><div class="icon">🔮</div><div>준비 중입니다</div></div>
</div>

<!-- 추가예정1 탭 (시세 추이) -->
<div class="page" id="page-coming1">
  <div class="controls">
    <input class="search" type="text" id="chart-search" placeholder="아이템 검색..." oninput="renderChipGrid()" />
  </div>

  <div id="recent-wrap" style="display:none; margin-bottom: 1rem;">
    <div class="chip-section-label">최근 본 아이템</div>
    <div class="chip-row" id="recent-chips"></div>
  </div>

  <div class="chip-section-label">아이템 선택</div>
  <div class="chip-grid" id="chip-grid"></div>

  <div class="chart-panel" id="chart-panel">
    <div class="chart-panel-empty" id="chart-empty">아이템을 선택하면 최근 30일 가격 변동 그래프가 표시됩니다</div>
    <div class="chart-panel-head" id="chart-head" style="display:none;">
      <div class="chart-img" id="chart-head-img"></div>
      <div>
        <div class="chart-head-name" id="chart-head-name"></div>
        <div class="chart-head-sub" id="chart-head-sub">최근 30일 · Sigil 기준</div>
      </div>
    </div>
    <div class="chart-canvas-wrap" id="chart-canvas-wrap" style="display:none;">
      <div id="price-chart"></div>
    </div>
  </div>
</div>

<!-- 추가예정2 탭 -->
<div class="page" id="page-coming2">
  <div class="coming-soon"><div class="icon">🚧</div><div>준비 중입니다</div></div>
</div>

<script>
const API_BASE = 'https://elf-market-api.vercel.app';

// 이미지 파일명: images/아이템ID.png 로 저장하면 자동 적용됩니다
// 예: images/21101.png → Carrot 이미지
const IMG_PATH = 'images/';

const ITEMS = {
  resources: [
    {id:21101,name:'Carrot', korean:'당근', emoji:'🥕'},
    {id:21102,name:'Potato', korean:'감자', emoji:'🥔'},
    {id:21103,name:'Pumpkin', korean:'호박', emoji:'🎃'},
    {id:21104,name:'Broccoli', korean:'브로콜리', emoji:'🥦'},
    {id:21105,name:'Tomato', korean:'토마토', emoji:'🍅'},
    {id:21106,name:'Beet', korean:'비트', emoji:'🫚'},
    {id:21107,name:'Wheat', korean:'밀', emoji:'🌾'},
    {id:21108,name:'Corn', korean:'옥수수', emoji:'🌽'},
    {id:21109,name:'Chili', korean:'고추', emoji:'🌶️'},
    {id:21110,name:'Strawberry', korean:'딸기', emoji:'🍓'},
    {id:21111,name:'Watermelon', korean:'수박', emoji:'🍉'},
    {id:21112,name:'Ryegrass', korean:'호밀풀', emoji:'🌿'},
    {id:22101,name:'Betel Nut', korean:'빈랑', emoji:'🥜'},
    {id:22102,name:'Banana', korean:'바나나', emoji:'🍌'},
    {id:22103,name:'Dates', korean:'대추', emoji:'🫘'},
    {id:22104,name:'Mango', korean:'망고', emoji:'🥭'},
    {id:22105,name:'Sugar Apple', korean:'설탕사과', emoji:'🍈'},
    {id:22106,name:'Cherry', korean:'체리', emoji:'🍒'},
    {id:22107,name:'Green Plum', korean:'매실', emoji:'🍑'},
    {id:22108,name:'Grape', korean:'포도', emoji:'🍇'},
    {id:22109,name:'Pomegranate', korean:'석류', emoji:'🍎'},
    {id:22110,name:'Coconut', korean:'코코넛', emoji:'🥥'},
    {id:211,name:'Poplar Wood', korean:'일반나무', emoji:'🪵'},
    {id:212,name:'Birch Wood', korean:'자작나무', emoji:'🪵'},
    {id:213,name:'Pine Wood', korean:'소나무', emoji:'🪵'},
    {id:214,name:'Oak Wood', korean:'참나무', emoji:'🪵'},
    {id:221,name:'Stone', korean:'돌', emoji:'🪨'},
    {id:222,name:'Copper Ore', korean:'구리광석', emoji:'🟤'},
    {id:223,name:'Iron Ore', korean:'철광석', emoji:'⚙️'},
    {id:224,name:'Mithril Ore', korean:'미스릴광석', emoji:'💎'},
    {id:311,name:'Egg', korean:'계란', emoji:'🥚'},
    {id:321,name:'Milk', korean:'우유', emoji:'🥛'},
  ],
  costume: [],
  general: []
};

// 이미지 로드 캐시
const imgCache = {};

function getImgEl(item) {
  const src = `${IMG_PATH}${item.id}.png`;
  if (imgCache[item.id] === false) {
    // 이미지 없음 → 이모지 표시
    return `<span style="font-size:36px">${item.emoji}</span>`;
  }
  return `<img src="${src}" alt="${item.name}" onerror="this.parentElement.innerHTML='<span style=\\'font-size:36px\\'>${item.emoji}</span>'; imgCache[${item.id}]=false;" />`;
}

let prices = {};
let currentSubTab = 'resources';
let accessToken = '';

function setMainTab(tab) {
  document.querySelectorAll('.main-tab').forEach((t, i) => {
    t.classList.toggle('active', ['realtime','sigil','coming1','coming2'][i] === tab);
  });
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
}

function setSubTab(tab) {
  currentSubTab = tab;
  document.querySelectorAll('.sub-tab').forEach((t, i) => {
    t.classList.toggle('active', ['resources','costume','general'][i] === tab);
  });
  renderCards();
}

function setStatus(state, text) {
  const dot = document.getElementById('dot');
  dot.className = 'dot' + (state === 'ok' ? '' : state === 'error' ? ' error' : ' loading');
  document.getElementById('status-text').textContent = text;
}

async function getAccessToken() {
  const res = await fetch(`${API_BASE}/api/refresh`, { method: 'POST' });
  const data = await res.json();
  if (data.code !== 0) throw new Error('토큰 갱신 실패: ' + data.message);
  return 'Bearer ' + data.data.accessToken;
}

async function fetchPrice(itemId) {
  const url = `${API_BASE}/api/price?itemId=${itemId}&accessToken=${encodeURIComponent(accessToken)}`;
  const res = await fetch(url);
  const data = await res.json();
  if (data.code !== 0) throw new Error(data.message);
  if (!data.data?.length) return null;
  const d = data.data[0];
  return (d.totalAmount / 1e9 / d.itemNum);
}

async function loadAll() {
  setStatus('loading', '토큰 갱신 중...');
  document.getElementById('error-area').innerHTML = '';
  try {
    accessToken = await getAccessToken();
  } catch(e) {
    setStatus('error', '서버 오류');
    document.getElementById('error-area').innerHTML = `<div class="error-msg">❌ ${e.message}</div>`;
    return;
  }

  const allItems = [...ITEMS.resources, ...ITEMS.costume, ...ITEMS.general];
  let done = 0;
  setStatus('loading', `가격 조회 중... (0/${allItems.length})`);

  for (const item of allItems) {
    try { prices[item.id] = await fetchPrice(item.id); }
    catch(e) { prices[item.id] = null; }
    done++;
    setStatus('loading', `가격 조회 중... (${done}/${allItems.length})`);
    renderCards();
    await new Promise(r => setTimeout(r, 150));
  }

  setStatus('ok', '업데이트 완료');
  document.getElementById('last-update').textContent = '마지막 업데이트: ' + new Date().toLocaleTimeString('ko-KR');
  setTimeout(loadAll, 5 * 60 * 1000);
}

function renderCards() {
  const search = document.getElementById('search').value.toLowerCase();
  const items = ITEMS[currentSubTab].filter(item =>
    !search || item.name.toLowerCase().includes(search) || String(item.id).includes(search)
  );

  if (!items.length) {
    document.getElementById('grid').innerHTML = '<div class="empty">검색 결과가 없습니다</div>';
    return;
  }

  document.getElementById('grid').innerHTML = items.map(item => {
    const price = prices[item.id];
    const hasPrice = price !== undefined;
    const loading = !hasPrice;
    return `<div class="card ${loading ? 'loading' : ''}">
      <div class="card-img">${getImgEl(item)}</div>
      <div class="card-name">${item.name}</div>
      <div class="card-korean">${item.korean}</div>
      <div class="card-divider"></div>
      <div class="card-price">${price != null ? price.toFixed(6) : (hasPrice ? 'N/A' : '···')}</div>
      <div class="card-price-label">Sigil</div>
      <div class="card-price-label">Recent transactions</div>
      <div class="card-price-label">(최근 거래가)</div>
    </div>`;
  }).join('');
}

renderCards();
loadAll();

/* ════════════════════════════════════════════
   추가예정1: 시세 추이 (가격 변동 그래프) 탭
   ════════════════════════════════════════════ */

const HISTORY_URL = 'data/price-history.json';
const RECENT_KEY = 'elf-market-recent-items';
const CHART_DAYS = 30;

// 칩 그리드에 보여줄 전체 아이템 목록 (실시간 탭과 동일 데이터 재사용)
const ALL_CHART_ITEMS = [...ITEMS.resources, ...ITEMS.costume, ...ITEMS.general];

let priceHistory = null;       // price-history.json 캐시
let selectedChartItemId = null;

function getRecentItemIds() {
  try {
    return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]');
  } catch { return []; }
}

function addRecentItemId(id) {
  let recent = getRecentItemIds().filter(x => x !== id);
  recent.unshift(id);
  recent = recent.slice(0, 6); // 최대 6개만 보관
  localStorage.setItem(RECENT_KEY, JSON.stringify(recent));
}

function chipMarkup(item, selected) {
  const src = `${IMG_PATH}${item.id}.png`;
  const inner = imgCache[item.id] === false
    ? `<span>${item.emoji}</span>`
    : `<img src="${src}" alt="${item.name}" onerror="this.parentElement.innerHTML='<span>${item.emoji}</span><span class=\\'chip-tip\\'>${item.name} (${item.korean})</span>'; imgCache[${item.id}]=false;" />`;
  return `<div class="chip ${selected ? 'selected' : ''}" data-id="${item.id}" onclick="selectChartItem(${item.id})">
    ${inner}
    <span class="chip-tip">${item.name} (${item.korean})</span>
  </div>`;
}

function renderChipGrid() {
  const search = document.getElementById('chart-search').value.toLowerCase();
  const filtered = ALL_CHART_ITEMS.filter(item =>
    !search || item.name.toLowerCase().includes(search) || item.korean.includes(search) || String(item.id).includes(search)
  );

  document.getElementById('chip-grid').innerHTML = filtered.length
    ? filtered.map(item => chipMarkup(item, item.id === selectedChartItemId)).join('')
    : '<div class="empty" style="padding:2rem;">검색 결과가 없습니다</div>';

  renderRecentChips();
}

function renderRecentChips() {
  const recentIds = getRecentItemIds();
  const wrap = document.getElementById('recent-wrap');
  if (!recentIds.length) { wrap.style.display = 'none'; return; }

  const recentItems = recentIds
    .map(id => ALL_CHART_ITEMS.find(it => it.id === id))
    .filter(Boolean);

  if (!recentItems.length) { wrap.style.display = 'none'; return; }

  wrap.style.display = '';
  document.getElementById('recent-chips').innerHTML =
    recentItems.map(item => chipMarkup(item, item.id === selectedChartItemId)).join('');
}

async function ensurePriceHistoryLoaded() {
  if (priceHistory) return priceHistory;
  const res = await fetch(HISTORY_URL, { cache: 'no-store' });
  if (!res.ok) throw new Error('히스토리 파일을 불러올 수 없습니다 (' + res.status + ')');
  priceHistory = await res.json();
  return priceHistory;
}

async function selectChartItem(itemId) {
  selectedChartItemId = itemId;
  addRecentItemId(itemId);
  renderChipGrid();

  const item = ALL_CHART_ITEMS.find(it => it.id === itemId);
  if (!item) return;

  document.getElementById('chart-empty').style.display = 'none';
  document.getElementById('chart-head').style.display = 'flex';
  document.getElementById('chart-canvas-wrap').style.display = 'block';

  const headImgSrc = `${IMG_PATH}${item.id}.png`;
  document.getElementById('chart-head-img').innerHTML =
    imgCache[item.id] === false
      ? `<span>${item.emoji}</span>`
      : `<img src="${headImgSrc}" alt="${item.name}" onerror="this.parentElement.innerHTML='<span>${item.emoji}</span>'; imgCache[${item.id}]=false;" />`;
  document.getElementById('chart-head-name').textContent = `${item.name} (${item.korean})`;

  try {
    const history = await ensurePriceHistoryLoaded();
    drawPriceChart(item, history[String(itemId)] || []);
  } catch (e) {
    document.getElementById('chart-canvas-wrap').style.display = 'none';
    document.getElementById('chart-empty').style.display = 'block';
    document.getElementById('chart-empty').textContent = '가격 기록을 불러오지 못했습니다: ' + e.message;
  }
}

function drawPriceChart(item, rawEntries) {
  const cutoff = Date.now() - CHART_DAYS * 24 * 60 * 60 * 1000;
  const entries = rawEntries
    .filter(e => new Date(e.t).getTime() >= cutoff)
    .sort((a, b) => new Date(a.t) - new Date(b.t));

  const canvasWrap = document.getElementById('chart-canvas-wrap');
  const emptyEl = document.getElementById('chart-empty');

  if (!entries.length) {
    canvasWrap.style.display = 'none';
    emptyEl.style.display = 'block';
    emptyEl.textContent = '최근 30일간의 가격 기록이 없습니다';
    return;
  }

  canvasWrap.style.display = 'block';
  emptyEl.style.display = 'none';

  renderSvgLineChart(document.getElementById('price-chart'), entries);
}

function renderSvgLineChart(container, entries) {
  // ── 레이아웃 설정 ──
  const W = 800, H = 280;
  const padL = 56, padR = 16, padT = 16, padB = 36;
  const plotW = W - padL - padR;
  const plotH = H - padT - padB;

  const values = entries.map(e => e.p);
  let minV = Math.min(...values);
  let maxV = Math.max(...values);
  if (minV === maxV) { minV -= minV * 0.1 || 1; maxV += maxV * 0.1 || 1; }
  const padV = (maxV - minV) * 0.1;
  minV -= padV; maxV += padV;

  const n = entries.length;
  const xFor = (i) => padL + (n === 1 ? plotW / 2 : (i / (n - 1)) * plotW);
  const yFor = (v) => padT + plotH - ((v - minV) / (maxV - minV)) * plotH;

  // ── 그리드 + y축 라벨 (5단) ──
  const gridCount = 4;
  let gridSvg = '';
  let yLabelsSvg = '';
  for (let g = 0; g <= gridCount; g++) {
    const v = minV + ((maxV - minV) * g) / gridCount;
    const y = yFor(v);
    gridSvg += `<line class="grid-line" x1="${padL}" y1="${y}" x2="${W - padR}" y2="${y}" />`;
    yLabelsSvg += `<text class="axis-label" x="${padL - 8}" y="${y + 3}" text-anchor="end">${v.toFixed(4)}</text>`;
  }

  // ── x축 라벨 (최대 6개로 줄여서 표시) ──
  const xLabelStep = Math.max(1, Math.ceil(n / 6));
  let xLabelsSvg = '';
  entries.forEach((e, i) => {
    if (i % xLabelStep !== 0 && i !== n - 1) return;
    const d = new Date(e.t);
    const label = `${d.getMonth() + 1}/${d.getDate()}`;
    xLabelsSvg += `<text class="axis-label" x="${xFor(i)}" y="${H - padB + 16}" text-anchor="middle">${label}</text>`;
  });

  // ── 선 + 영역 채우기 경로 ──
  const linePoints = entries.map((e, i) => `${xFor(i)},${yFor(e.p)}`).join(' ');
  const fillPath = `M${xFor(0)},${yFor(minV)} L${linePoints.split(' ').join(' L')} L${xFor(n - 1)},${yFor(minV)} Z`;
  const linePath = `M${linePoints.split(' ').join(' L')}`;

  // ── 데이터 포인트 (호버 가능한 투명 히트영역 + 실제 점) ──
  let dotsSvg = '';
  entries.forEach((e, i) => {
    const x = xFor(i), y = yFor(e.p);
    dotsSvg += `<circle class="data-dot-hit" cx="${x}" cy="${y}" r="9"
      data-price="${e.p}" data-time="${e.t}" onmouseenter="showChartTooltip(event)" onmouseleave="hideChartTooltip()"></circle>
      <circle class="data-dot" cx="${x}" cy="${y}" r="2.5"></circle>`;
  });

  container.innerHTML = `
    <svg class="price-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none">
      ${gridSvg}
      <path class="fill-path" d="${fillPath}"></path>
      <path class="line-path" d="${linePath}"></path>
      ${dotsSvg}
      ${yLabelsSvg}
      ${xLabelsSvg}
    </svg>
    <div class="chart-tooltip" id="chart-tooltip"></div>
  `;
}

function showChartTooltip(evt) {
  const dot = evt.target;
  const price = parseFloat(dot.getAttribute('data-price'));
  const time = dot.getAttribute('data-time');
  const d = new Date(time);
  const label = `${d.getMonth() + 1}/${d.getDate()} ${String(d.getHours()).padStart(2, '0')}:00 · ${price.toFixed(6)} Sigil`;

  const tooltip = document.getElementById('chart-tooltip');
  const wrap = document.getElementById('chart-canvas-wrap');
  const svg = wrap.querySelector('svg');
  const svgRect = svg.getBoundingClientRect();
  const wrapRect = wrap.getBoundingClientRect();

  // viewBox 좌표 → 실제 픽셀 좌표로 변환
  const scaleX = svgRect.width / 800;
  const scaleY = svgRect.height / 280;
  const cx = parseFloat(dot.getAttribute('cx')) * scaleX;
  const cy = parseFloat(dot.getAttribute('cy')) * scaleY;

  tooltip.textContent = label;
  tooltip.style.left = (svgRect.left - wrapRect.left + cx) + 'px';
  tooltip.style.top = (svgRect.top - wrapRect.top + cy - 8) + 'px';
  tooltip.classList.add('show');
}

function hideChartTooltip() {
  const tooltip = document.getElementById('chart-tooltip');
  if (tooltip) tooltip.classList.remove('show');
}

renderChipGrid();
</script>
